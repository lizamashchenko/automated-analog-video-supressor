# ==========================
# Logging
# ==========================
[logging]
base_dir  = "logs"  # all runs are stored as subdirectories here
verbosity = 1       # 0=video detections only  1=errors+detections  2=+decisions  3=+component debug files  4=+raw IQ samples

# ==========================
# SDR Device
# ==========================
[sdr]
sample_rate = 20_000_000    # Hz
lna_gain    = 32
vga_gain    = 32
min_freq    = 100_000_000   # Hz
max_freq    = 6_000_000_000 # Hz
buffer_size = 262144

# "hackrf" uses the live HackRF One.
# "file"   replays a recorded sweep — set file_path and metadata_path below.
[device]
type          = "file"

# no drone
# name                  - harmonic               - cyclo             - autocorr (0.18, 3v)  - autocorr (0.17, 3)
# sweep_20260407_183603 - 1fp 2142               - good              - good                 - good
# sweep_20260407_183747 - 1fp 2142               - good              - good                 - fp 2460
# sweep_20260407_183646 - good                   - good              - good                 - good
# sweep_20260407_183847 - good                   - good              - good                 - good
# sweep_20260407_183944 - good                   - good              - good                 - good

# drone on the table
# sweep_20260407_184542 - p (bug on 700)         - p (bug on 700)    - 1fp, p (bug on 700)  - 2 fp, p (bug on 700)
# sweep_20260407_184609 - p (bug on 700)         - p (bug on 700)    - p (bug on 700)       - p (bug on 700)
# sweep_20260407_184635 - p (bug on 700)         - p (bug on 700)    - 1fp, p (bug on 700)  - 1 fp, p (bug on 700)
# sweep_20260407_184702 - p (bug on 700)         - p (bug on 700)    - p (bug on 700)       - p (bug on 700)
# sweep_20260407_184730 - 1fp, p (bug on 700)    - p (bug on 700)    - p (bug on 700)       - p (bug on 700) 

# drone through the wall
# sweep_20260407_193518 - good                   - good              - good                 - good
# sweep_20260407_193545 - good                   - good              - good                 - good
# sweep_20260407_193626 - 1fp 0p                 - 0s                - 0                    - good
# sweep_20260407_193653 - no plateau, fp on 700  - no plateau, 0     - np 0                 - np 0s

file_path     = "/home/liza/UCU/diploma/dataset/iq_recordings/sweep_20260407_184702/iq.bin"
metadata_path = "/home/liza/UCU/diploma/dataset/iq_recordings/sweep_20260407_184702/metadata.csv"

# ==========================
# Spectrum / FFT
# ==========================
[fft]
fft_size = 4096

# ==========================
# Coarse Scan
# ==========================
[scan]
wide_sampling_num = 10

# ==========================
# Plateau Detection
# ==========================
[plateau]
required_ratio        = 0.3         # fraction of scans that must hit to confirm
freq_tolerance        = 2_000_000   # Hz — bin width for dedup map
above_noise_threshold = 0.5         # dB above noise floor to count as a peak
edge_drop_level       = 0.1         # how far below peak to mark lobe edge
min_lobe_size         = 0.2         # MHz — discard lobes narrower than this
lobe_merge_gap        = 3.0         # MHz — merge lobes closer than this
min_video_width       = 2.7         # MHz — minimum plateau width to keep
max_video_width       = 10.0        # MHz — maximum plateau width to keep

# ==========================
# Demodulation / Voting
# ==========================
[demod]
max_samples_per_plateau = 5
required_hits           = 3   # minimum sample buffers needed to run classifier

# ==========================
# Detection
# ==========================
[detection]
active_classifier = "autocorr"   # "harmonic" | "cyclo" | "autocorr"

# ==========================
# Harmonic Classifier
# ==========================
[classifier.harmonic]
required_harmonics     = 3       # how many harmonics must be consistently present
harmonic_ratio         = 0.4     # fraction of buffers a harmonic must appear in to count
threshold_db           = 6       # dB above noise floor the peak must be
valley_drop_db         = 4       # dB the midpoint between peaks must be below the peak
max_harmonic_spread_db = 10     # dB — max adjacent-peak level difference; rejects spectra with one dominant spike
target_freq            = 15625   # Hz — PAL line rate (use 15734 for NTSC)
sync_band              = 2000    # Hz — ±window around each peak/valley sample point
harmonics              = [1, 2, 3, 4]  # 0 = near-DC, 1 = 1×f, 2 = 2×f, 3 = 3×f

# ==========================
# Cyclostationary Classifier
# ==========================
[classifier.cyclo]
ratio_threshold = 2.3 # 2.8 3.2 3.5 3.9
score_threshold = 6
required_votes  = 5
target_freq     = 15625        # Hz — PAL/NTSC line rate
harmonics       = [1, 2, 3, 4]
min_harmonics   = 3            # how many harmonics must exceed ratio_threshold per buffer
max_harmonic_spread_db = 10    # max dB difference between consecutive harmonic peaks 9.97 9.3 6

# ==========================
# Autocorrelation Classifier
# ==========================
[classifier.autocorr]
decimation          = 1
line_freq           = 15625   # Hz — expected lag frequency
lag_tolerance       = 0.1     # fraction of target lag used as ±window
peak_threshold      = 0.31    # 1st-harmonic peak (minus baseline) required to vote
secondary_threshold = 0.14     # 2nd-harmonic peak required to confirm periodicity
lag_strict          = 1       # max |argmax − target_lag| in decimated samples
required_votes      = 3

